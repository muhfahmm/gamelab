<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Seleksi Rumah Andi - Kuis 03</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 20%);
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .input-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="number"], select {
            background: var(--bg-dark);
            border: 1px solid var(--glass-border);
            padding: 0.8rem 1rem;
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 1.5rem;
            border-radius: 1rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .checkbox-item:hover {
            transform: translateX(5px);
        }

        .checkbox-item input {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--primary);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .result-container {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .result-card {
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 2px solid transparent;
        }

        .result-card.success {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
        }

        .result-card.fail {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .success .status-badge { background: var(--success); }
        .fail .status-badge { background: var(--danger); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .criteria-list {
            text-align: left;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 0.75rem;
            font-size: 0.9rem;
        }

        .criteria-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .icon-check { color: var(--success); }
        .icon-cross { color: var(--danger); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>House Selection System</h1>
            <p class="subtitle">Bantu Andi menemukan rumah impian sesuai kriterianya</p>
        </header>

        <div class="input-card">
            <div class="grid">
                <div class="input-group">
                    <label for="kawasan">Kondisi Kawasan</label>
                    <select id="kawasan">
                        <option value="aman">Aman (Bebas Banjir & Longsor)</option>
                        <option value="banjir">Rawan Banjir</option>
                        <option value="longsor">Rawan Longsor</option>
                        <option value="industri">Kawasan Industri/Pabrik</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="luasTanah">Luas Tanah (m²)</label>
                    <input type="number" id="luasTanah" placeholder="Contoh: 850" min="0">
                </div>
                <div class="input-group">
                    <label for="luasBangunan">Luas Bangunan (m²)</label>
                    <input type="number" id="luasBangunan" placeholder="Contoh: 450" min="0">
                </div>
            </div>

            <label style="display: block; margin-bottom: 1rem;">Fasilitas Tersedia</label>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="kolamRenang"> Kolam Renang
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="parkirLuas"> Parkir Luas
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="kebunBelakang"> Kebun Belakang
                </label>
            </div>

            <button id="btnCek" onclick="cekKriteria()">Analisis Kelayakan Rumah</button>
        </div>

        <div id="resultContainer" class="result-container">
            <div id="resultCard" class="result-card">
                <div id="statusBadge" class="status-badge">MEMENUHI KRITERIA</div>
                <h2 id="resultTitle">Selamat! Rumah ini cocok untuk Andi.</h2>
                <div id="criteriaList" class="criteria-list">
                </div>
            </div>
        </div>
    </div>

    <script src="kuis03.js"></script>
</body>
</html>
