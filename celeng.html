<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- HERO SECTION -->
    <div class="container mt-5">
        <div class="row align-items-center">
            <div class="col-lg-6">
                <h1>Selamat Datang</h1>
                <p>Website ini dibuat menggunakan bootstrap.</p>
                <button class="btn btn-success">Pelajari</button>
            </div>
            <div class="col-lg-6">
                <img src="https://picsum.photos/400" alt="Hero Image" class="img-fluid">
            </div>
        </div>
    </div>

    <!-- PRODUK -->
    <div class="container mt-5">
        <h2 class="mb-4">Produk Kami</h2>
        <div class="row g-3">
            <div class="col-12 col-sm-6 col-md-4">
                <div class="card h-100">
                    <img src="https://picsum.photos/200" alt="Produk 1" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Produk 1</h5>
                        <p class="card-text">Deskripsi produk.</p>
                        <button class="btn btn-primary w-100">Beli</button>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-md-4">
                <div class="card h-100">
                    <img src="https://picsum.photos/200" alt="Produk 2" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Produk 2</h5>
                        <p class="card-text">Deskripsi produk.</p>
                        <button class="btn btn-primary w-100">Beli</button>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-md-4">
                <div class="card h-100">
                    <img src="https://picsum.photos/200" alt="Produk 3" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Produk 3</h5>
                        <p class="card-text">Deskripsi produk.</p>
                        <button class="btn btn-primary w-100">Beli</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FORM KONTAK -->
    <div class="container mt-5">
        <h2 class="mb-4">Hubungi Kami</h2>
        <div class="row">
            <div class="col-12">
                <form class="shadow p-4 rounded">
                    <div class="mb-3">
                        <label for="nama" class="form-label">Nama</label>
                        <input type="text" id="nama" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="pesan" class="form-label">Pesan</label>
                        <textarea id="pesan" class="form-control" rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Kirim</button>
                </form>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="mt-5 p-3 bg-dark text-white">
        <p class="mb-0">Copyright 2026</p>
    </div>
</body>
</html>
